# Example monitor logging config.
#
# Logging only writes monitor outputs and never controls scenario stop.
# This file includes every registered frame, table, summary, and numeric-source
# type. Replace `CutInVehicle` with an XOSC ScenarioObject name.

logging:
  enabled: true
  output_dir: monitor
  flush_every_n_rows: 100
  float_precision: 6

  # Fixed-cardinality frame logs are merged into one CSV row per frame.
  frame:
    enabled: true
    every_n_steps: 1
    output: frame_metrics.csv
    recorders:
      - type: ego_state
        name: ego
        fields: [x, y, z, yaw, speed, acceleration]

      - type: pair_ttc
        name: ego_to_cutin
        actor_a: {role: ego}
        actor_b: {entity_name: CutInVehicle}
        fields:
          - distance_m
          - closing_speed_mps
          - ttc_s
          - ttc_valid
          - ttc_status
          - in_lateral_conflict

      - type: pair_criticality
        name: ego_to_cutin_criticality
        actor_a: {role: ego}
        actor_b: {entity_name: CutInVehicle}
        fields:
          - longitudinal_distance_m
          - lateral_distance_m
          - relative_lateral_speed_mps
          - thw_s
          - drac_mps2

      - type: pair_clearance
        name: ego_to_cutin_clearance
        actor_a: {role: ego}
        actor_b: {entity_name: CutInVehicle}

  # Variable-cardinality logs are written as separate tables.
  # `agent_states.csv` is long-table format: one row per agent per logged frame.
  tables:
    - type: ego_state
      name: ego_state
      every_n_steps: 1
      output: ego_state.csv

    - type: agent_states
      name: agent_states
      every_n_steps: 1
      output: agent_states.csv

    - type: agent_geometry
      name: agent_geometry
      output: agent_geometry.csv
      once: true

    # Sparse event table: writes a row only when a matching collision is reported.
    - type: collision_events
      name: ego_collision_events
      output: collision_events.csv
      actor_a: {role: ego}
      deduplicate: true

    # One row per logged control command returned by AV and passed to simulator.
    - type: control_commands
      name: control_commands
      every_n_steps: 1
      output: control_commands.csv

    - type: scenario_events
      name: scenario_events
      output: scenario_events.csv
      actor_a: {role: ego}
      deduplicate: true

  # Scenario-level metrics are merged into one row in result.csv.
  # basic_summary is included by default as `run.*`.
  summary:
    output: result.csv
    include_basic: true
    recorders:
      - type: collision
        name: ego_collision
        actor_a: {role: ego}

      - type: min_ttc
        name: ego_to_cutin
        actor_a: {role: ego}
        actor_b: {entity_name: CutInVehicle}

      - type: max_speed
        name: ego
        actor: {role: ego}

      # Generic scalar aggregation. This records positive deceleration magnitude.
      - type: numeric_summary
        name: ego_deceleration
        source:
          type: kinematic
          actor: {role: ego}
          field: acceleration
        transforms: [negate, positive_part]
        aggregations: [max, mean, std]
        include_extrema_location: true

      - type: numeric_summary
        name: ego_to_cutin_distance
        source:
          type: relative_position
          field: distance_m
          source_actor: {role: ego}
          target_actor: {entity_name: CutInVehicle}
        aggregations: [min, max, mean]

      - type: numeric_summary
        name: ego_to_cutin_ttc_source
        source:
          type: pair_ttc
          field: ttc_s
          actor_a: {role: ego}
          actor_b: {entity_name: CutInVehicle}
          lateral_threshold_m: 2.0
        aggregations: [min]

      - type: numeric_summary
        name: ego_to_cutin_thw
        source:
          type: pair_criticality
          field: thw_s
          actor_a: {role: ego}
          actor_b: {entity_name: CutInVehicle}
        aggregations: [min]

      - type: numeric_summary
        name: ego_to_cutin_drac
        source:
          type: pair_criticality
          field: drac_mps2
          actor_a: {role: ego}
          actor_b: {entity_name: CutInVehicle}
          lateral_threshold_m: 2.0
        aggregations: [max]

      - type: numeric_summary
        name: cutin_lateral_speed
        source:
          type: pair_criticality
          field: relative_lateral_speed_mps
          actor_a: {role: ego}
          actor_b: {entity_name: CutInVehicle}
        aggregations: [min, max]
