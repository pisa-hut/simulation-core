# Example monitor config.
#
# `stop_condition` controls when a scenario should stop. A list is treated as a
# default top-level OR. Each top-level item should set outcome:
# Success, Fail, or Invalid.
# `logging.frame` and `logging.tables` only write monitor logs and never stop the scenario.

logging:
  enabled: true
  output_dir: monitor
  flush_every_n_rows: 100
  float_precision: 6

  # Fixed-cardinality frame logs are merged into one CSV row per frame.
  frame:
    enabled: true
    every_n_steps: 1
    output: frame_metrics.csv
    recorders:
      - type: ego_state
        name: ego
        actor_id: 0
        fields: [x, y, z, yaw, speed, acceleration]

      - type: pair_ttc
        name: ego_to_agent_1
        actor_id_a: 0
        actor_id_b: 1

  # Variable-cardinality logs are written as separate tables.
  # `agent_states.csv` is long-table format: one row per agent per logged frame.
  tables:
    - type: agent_states
      name: agent_states
      every_n_steps: 1
      output: agent_states.csv

    # Sparse event table: writes a row only when a matching collision is reported.
    - type: collision_events
      name: ego_collision_events
      output: collision_events.csv
      actor_id_a: 0
      deduplicate: true

  # Scenario-level metrics are merged into one row in result.csv.
  # basic_summary is included by default as `run.*`.
  summary:
    output: result.csv
    include_basic: true
    recorders:
      - type: min_ttc
        name: ego_to_agent_1
        actor_id_a: 0
        actor_id_b: 1

      - type: max_speed
        name: ego
        actor_id: 0

stop_condition:
  - type: collision
    name: collision_guard
    outcome: Fail
    actor_id_a: 0
    max_buffer_size: 1

  - type: timeout
    name: timeout_45s
    outcome: Invalid
    timeout_ms: 45000

  # - type: pair_ttc
  #   name: low_ttc_ego_to_agent_1
  #   outcome: Fail
  #   actor_id_a: 0
  #   actor_id_b: 1
  #   threshold_s: 1.0

  - type: reach_target_position
    name: ego_reaches_goal
    outcome: Success
    target: ego
    distance_threshold_m: 2.0
