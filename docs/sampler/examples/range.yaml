parameters:
  - name: ego_speed
    type: double
    range: [8.0, 30.0]
  - name: agent0_speed
    type: double
    range: [5.0, 25.0]
  - name: cutin_offset
    type: double
    range: [-2.0, 2.0]
  - name: lane_index
    type: int
    values: [1, 2, 3]
  - name: behavior
    type: categorical
    values: [keep_lane, cut_in, brake]

# Optional simulator output mapping. When present, the runner samples only
# parameters above, records those sampled values in summaries, and sends this
# mapped interface to the simulator.
# outputs:
#   ego_speed: ego_speed
#   agent0_speed: ego_speed / 2
